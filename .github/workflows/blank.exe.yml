name: Build Windows EXE

on:
  push:
    branches: [ main ]          # 推到 main 就執行
  workflow_dispatch:            # 允許在 Actions 手動執行

permissions:
  contents: write               # 讓 workflow 能上傳 artifacts / release

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 取回原始碼
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 設定 Python 3.11
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3. 安裝 PyInstaller 與 numpy（之後若還有其他套件可一起加）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller numpy

    # 4. 打包 scan.py → dist/scan.exe
    - name: Build scan.exe
      working-directory: ${{ github.workspace }}   # 確保在 repo 根目錄
      run: |
        pyinstaller --onefile --noconsole --icon scan_icon.ico scan.py

    # 5. 上傳可執行檔為 Artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: scan-exe
        path: dist/scan.exe
